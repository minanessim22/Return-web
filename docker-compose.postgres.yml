version: "3.9"

services:
  db:
    image: postgres:16
    container_name: return-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: return_app
    ports:
      - "5432:5432"
    volumes:
      - return_postgres_data:/var/lib/postgresql/data

volumes:
  return_postgres_data:
